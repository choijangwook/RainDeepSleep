---
layout: default
title: Nature
---

<h1>🌿 Nature</h1>

{% assign posts = site.categories.nature %}

{% for post in posts %}
  <h2 style="font-size:18px; font-weight:400; margin-bottom:8px;">
    <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
  </h2>
  <p>{{ post.date | date: "%Y-%m-%d" }}</p>
{% endfor %}
