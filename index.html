---
layout: default
title: "Rain Sound for Deep Sleep"
---

<h2 style="text-align:center;margin:15px 0;font-size:15px;">
🌧 Rain Sound for Deep Sleep
</h2>

<!-- 🔥 TIMER -->
<div style="text-align:center;margin:10px 0;">
<b>⏱ TIMER</b><br>
<button onclick="setTimer(120)">2h</button>
<button onclick="setTimer(240)">4h</button>
<button onclick="setTimer(480)">8h</button>

<br><br>

<!-- 🔥 테스트 버튼 -->
<button onclick="setTimer(0.1)">테스트 (6초)</button>
  
</div>

<!-- 🔥 영상 -->
{% assign latest = site.posts.first %}

<div class="video">
<iframe id="player"
src="https://www.youtube.com/embed/{{ latest.youtube }}?enablejsapi=1&playsinline=1"
allow="encrypted-media"
allowfullscreen>
</iframe>
</div>

<!-- 🔥 목록 -->
<h3 style="text-align:center;margin-top:20px;">🎬 Latest Videos</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;">

{% for post in site.posts %}
<a href="{{ site.baseurl }}{{ post.url }}" style="text-decoration:none;color:#000;">
  <div style="background:#eee;border-radius:10px;overflow:hidden;">
    <img src="https://img.youtube.com/vi/{{ post.youtube }}/hqdefault.jpg" style="width:100%;">
    <div style="padding:6px;font-size:13px;">
      🌧 {{ post.title }}
    </div>
  </div>
</a>
{% endfor %}

</div>

<!-- 🔥 YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let timerId;
let isReady = false;

// 유튜브 준비
function onYouTubeIframeAPIReady(){
  player = new YT.Player('player', {
    events: {
      'onReady': function(){
        isReady = true;
      }
    }
  });
}

// 🔥 TIMER 설정
function setTimer(min){
  if(timerId) clearTimeout(timerId);

  timerId = setTimeout(()=>{
    stopVideo();
    alert("⏰ 타이머 종료");
  }, min * 60000);

  alert("⏱ " + min + "분 설정");
}

// 🔥 영상 정지 (완전 확실)
function stopVideo(){
  // 1차: API
  if(isReady && player){
    player.stopVideo();
  }

  // 2차: 강제 종료
  const iframe = document.getElementById("player");
  if(iframe){
    iframe.src = "";
  }
}
</script>
