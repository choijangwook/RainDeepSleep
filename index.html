---
layout: default
title: "Rain Sound for Deep Sleep"
---

<!-- 홈 -->
<a href="{{ site.baseurl }}/" style="
position:fixed;top:15px;left:15px;
background:#000;color:#fff;padding:8px 12px;
border-radius:8px;text-decoration:none;z-index:999;">
🏠
</a>

<h2 style="text-align:center;margin:15px 0 5px 60px;font-size:15px;">
🌧 Rain Sound for Deep Sleep
</h2>

<!-- TIMER -->
<div style="display:flex;justify-content:center;gap:10px;margin:10px 0;">
  <button onclick="setTimer(120)">2h</button>
  <button onclick="setTimer(240)">4h</button>
  <button onclick="setTimer(480)">8h</button>
</div>

<!-- 영상 -->
{% assign latest = site.posts.first %}
<div style="position:relative;width:100%;padding-bottom:56.25%;">
<iframe id="mainVideo"
src="https://www.youtube.com/embed/{{ latest.youtube }}?playsinline=1"
style="position:absolute;width:100%;height:100%;border:0;"
allowfullscreen>
</iframe>
</div>

<!-- 🎬 Latest Videos -->
<h2 style="text-align:center;margin-top:20px;">🎬 Latest Videos</h2>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;">

{% for post in site.posts %}
<a href="{{ site.baseurl }}{{ post.url }}" style="text-decoration:none;color:#000;">
  <div style="background:#eee;border-radius:10px;overflow:hidden;">
    <img src="https://img.youtube.com/vi/{{ post.youtube }}/hqdefault.jpg" style="width:100%;">
    <div style="padding:8px;font-size:13px;">🌧 {{ post.title }}</div>
  </div>
</a>
{% endfor %}

</div>

<script>
let timerId;

function setTimer(min){
  if(timerId) clearTimeout(timerId);

  timerId = setTimeout(()=>{
    const player = document.getElementById("mainVideo");
    if(player){
      player.remove(); // 🔥 완전 제거 (확실히 멈춤)
    }
    alert("⏰ 타이머 종료");
  }, min * 60000);

  alert("⏱ " + min + "분 타이머 설정됨");
}
</script>
