---
layout: default
title: "Rain Sound"
---

<style>
*{box-sizing:border-box;}

.video{
  width:100%;
  position:relative;
  padding-bottom:56.25%;
}

.video iframe{
  position:absolute;
  width:100%;
  height:100%;
}

/* 축소 문제 방지 */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  width:100%;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
}
</style>

<!-- 상단 -->
<div class="topbar">
  <a class="navbtn" href="/">🏠 Home</a>
  <div>
    <a class="navbtn" href="#prev">←</a>
    <a class="navbtn" href="#next">→</a>
  </div>
</div>

<h2 style="text-align:center;">🌧 Rain Sound</h2>

{% assign latest = site.posts.first %}

<div class="video">
  <iframe id="player"
    src="https://www.youtube.com/embed/{{ latest.youtube }}"
    allowfullscreen>
  </iframe>
</div>

<!-- TIMER -->
<div class="timer">

  <b>⏱ TIMER</b>

  <div class="timer-row">
    <button onclick="setTimer(120,this)">2h</button>
    <button onclick="setTimer(240,this)">4h</button>
    <button onclick="setTimer(480,this)">8h</button>
  </div>

  <button class="test-btn" onclick="setTimer(0.1,this)">TEST</button>

</div>

<h3 style="text-align:center;">🎬 Latest Videos</h3>

<div class="grid">

{% for post in site.posts %}
<a href="{{ post.url }}">
  <div class="card">
    <img src="https://img.youtube.com/vi/{{ post.youtube }}/hqdefault.jpg">
    <div style="padding:8px;font-size:13px;">
      🌧 {{ post.title }}
    </div>
  </div>
</a>
{% endfor %}

</div>
