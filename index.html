---
layout: default
title: "Rain Sound for Deep Sleep"
---

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:sans-serif;
}

/* 영상 */
.video{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
}
.video iframe{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  border:0;
}

/* TIMER */
.timer{
  text-align:center;
  padding:15px;
  background:#fff;
}

/* 리스트 */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}
.card img{
  width:100%;
}
</style>

<h2 style="text-align:center;margin:10px 0;font-size:15px;">
🌧 Rain Sound for Deep Sleep
</h2>

<!-- 🔥 최신 영상 -->
{% assign latest = site.posts.first %}

<div class="video">
<iframe id="player"
src="https://www.youtube.com/embed/{{ latest.youtube }}?enablejsapi=1&playsinline=1&rel=0"
allow="encrypted-media"
allowfullscreen>
</iframe>
</div>

<!-- 🔥 TIMER (영상 아래 배치 → 겹침 완전 해결) -->
<div class="timer">
<b>⏱ TIMER</b><br>

<button onclick="setTimer(120)">2h</button>
<button onclick="setTimer(240)">4h</button>
<button onclick="setTimer(480)">8h</button>

<br><br>
<button onclick="setTimer(0.1)">테스트(6초)</button>
</div>

<!-- 🔥 Latest Videos -->
<h3 style="text-align:center;margin-top:20px;">🎬 Latest Videos</h3>

<div class="grid">

{% for post in site.posts %}
<a href="{{ site.baseurl }}{{ post.url }}" style="text-decoration:none;color:#000;">
  <div class="card">
    <img src="https://img.youtube.com/vi/{{ post.youtube }}/hqdefault.jpg">
    <div style="padding:6px;font-size:13px;">
      🌧 {{ post.title }}
    </div>
  </div>
</a>
{% endfor %}

</div>

<!-- 🔥 YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let timerId;
let ready = false;

// 플레이어 준비
function onYouTubeIframeAPIReady(){
  player = new YT.Player('player', {
    events:{
      'onReady': function(){
        ready = true;
      }
    }
  });
}

// TIMER 설정
function setTimer(min){
  if(timerId) clearTimeout(timerId);

  timerId = setTimeout(()=>{
    stopVideo();
    alert("⏰ 타이머 종료");
  }, min * 60000);

  alert("⏱ " + min + "분 설정");
}

// 🔥 영상 정지 (확실하게)
function stopVideo(){
  // 1차 (API)
  if(ready && player){
    player.stopVideo();
  }

  // 2차 (강제 종료)
  const iframe = document.getElementById("player");
  if(iframe){
    iframe.src = iframe.src;
  }
}
</script>
