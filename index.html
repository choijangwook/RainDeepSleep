---
layout: default
title: "Rain Sound"
---

{% assign latest = site.posts.first %}

<!-- 🔥 TOP BAR -->
<div class="topbar">
  <a href="{{ site.baseurl }}/">🏠 Home</a>

  <!-- 화살표 (이전/다음 구조 placeholder) -->
  <div>
    <a href="#">←</a>
    <a href="#">→</a>
  </div>
</div>

<!-- 🎬 FULL VIDEO -->
<div class="video-wrap">
  <iframe
    src="https://www.youtube.com/embed/{{ latest.youtube }}?autoplay=1&rel=0"
    allowfullscreen>
  </iframe>
</div>

<!-- 🎬 Latest Videos -->
<h3 style="text-align:center;margin:10px;">Latest Videos</h3>

<div class="list">

{% for post in site.posts %}

  <!-- 🔥 바로 재생 링크 -->
  <div class="item">
    <a href="{{ site.baseurl }}{{ post.url }}">
      🌧 {{ post.title }}
    </a>
  </div>

{% endfor %}

</div>
