---
layout: default
title: "Rain Sound for Deep Sleep"
---

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow-x:hidden;
  font-family:sans-serif;
}

/* 영상 */
.video{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
}
.video iframe{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  border:0;
  z-index:1;
}

/* 타이머 */
.timer{
  position:relative;
  z-index:10; /* 🔥 영상보다 위 */
  text-align:center;
  margin:10px 0;
  background:#fff;
  padding:10px;
}

/* 리스트 */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}
.card img{
  width:100%;
}
</style>

<h2 style="text-align:center;margin:15px 0;font-size:15px;">
🌧 Rain Sound for Deep Sleep
</h2>

<!-- 🔥 TIMER -->
<div class="timer">
<b>⏱ TIMER</b><br>

<button onclick="setTimer(120)">2h</button>
<button onclick="setTimer(240)">4h</button>
<button onclick="setTimer(480)">8h</button>

<br><br>
<button onclick="setTimer(0.1)">테스트(6초)</button>
</div>

<!-- 🔥 영상 -->
{% assign latest = site.posts.first %}

<div class="video">
<iframe id="player"
src="https://www.youtube.com/embed/{{ latest.youtube }}?playsinline=1&rel=0"
allowfullscreen>
</iframe>
</div>

<!-- 🔥 목록 -->
<h3 style="text-align:center;margin-top:20px;">🎬 Latest Videos</h3>

<div class="grid">

{% for post in site.posts %}
<a href="{{ site.baseurl }}{{ post.url }}" style="text-decoration:none;color:#000;">
  <div class="card">
    <img src="https://img.youtube.com/vi/{{ post.youtube }}/hqdefault.jpg">
    <div style="padding:6px;font-size:13px;">
      🌧 {{ post.title }}
    </div>
  </div>
</a>
{% endfor %}

</div>

<script>
let timer;

function setTimer(min){
  if(timer) clearTimeout(timer);

  timer = setTimeout(()=>{
    stopVideo();
    alert("⏰ 타이머 종료");
  }, min * 60000);

  alert("⏱ " + min + "분 설정");
}

// 🔥 무조건 멈추는 방식
function stopVideo(){
  const iframe = document.getElementById("player");
  if(iframe){
    iframe.src = iframe.src; // reload → 강제 정지
  }
}
</script>
