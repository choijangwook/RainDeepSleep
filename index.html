---
layout: default
title: "Rain ASMR"
---

{% assign posts = site.posts %}
{% assign latest = site.posts.first %}

<!-- TOP -->
<div class="topbar">
  <a href="{{ site.baseurl }}/">🏠 Home</a>

  <!-- 🔁 REAL NAV -->
  <div>
    {% if latest.previous %}
      <a href="{{ latest.previous.url }}">← Prev</a>
    {% endif %}

    {% if latest.next %}
      <a href="{{ latest.next.url }}">Next →</a>
    {% endif %}
  </div>
</div>

<!-- VIDEO -->
<div class="video-wrap">
  <iframe
    src="https://www.youtube.com/embed/{{ latest.youtube }}?autoplay=1&rel=0"
    allowfullscreen>
  </iframe>
</div>

<!-- LIST (minimal) -->
<div style="padding:10px;">
<h3>Latest Videos</h3>

{% for post in posts %}
  <div style="margin:6px 0;">
    🌧 <a href="{{ site.baseurl }}{{ post.url }}" style="color:#fff;">
      {{ post.title }}
    </a>
  </div>
{% endfor %}
</div>
