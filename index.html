---
layout: default
title: "Rain Sound for Deep Sleep"
---

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:sans-serif;
}

/* 영상 */
.video{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
}
.video iframe{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  border:0;
}

/* TIMER */
.timer{
  text-align:center;
  padding:15px;
  background:#fff;
}

.timer-row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.timer-row button{
  flex:1;
  padding:14px 0;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#4a90e2;
  color:white;
}

.test-btn{
  margin-top:12px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
}

/* 리스트 */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}
.card img{ width:100%; }
</style>

<h2 style="text-align:center;margin:10px 0;font-size:15px;">
🌧 Rain Sound for Deep Sleep
</h2>

<!-- 영상 -->
{% assign latest = site.posts.first %}

<div class="video">
<iframe id="player"
src="https://www.youtube.com/embed/{{ latest.youtube }}?playsinline=1&rel=0"
allowfullscreen>
</iframe>
</div>

<!-- TIMER -->
<div class="timer">

  <b>⏱ TIMER</b>

  <div class="timer-row">
    <button onclick="setTimer(120)">2 HOURS</button>
    <button onclick="setTimer(240)">4 HOURS</button>
    <button onclick="setTimer(480)">8 HOURS</button>
  </div>

  <button class="test-btn" onclick="setTimer(0.1)">
    TEST (6 sec)
  </button>

</div>

<!-- 목록 -->
<h3 style="text-align:center;margin-top:20px;">🎬 Latest Videos</h3>

<div class="grid">

{% for post in site.posts %}
<a href="{{ site.baseurl }}{{ post.url }}" style="text-decoration:none;color:#000;">
  <div class="card">
    <img src="https://img.youtube.com/vi/{{ post.youtube }}/hqdefault.jpg">
    <div style="padding:6px;font-size:13px;">
      🌧 {{ post.title }}
    </div>
  </div>
</a>
{% endfor %}

</div>

<script>
let timerId;

// 타이머 설정
function setTimer(min){
  if(timerId) clearTimeout(timerId);

  timerId = setTimeout(()=>{
    stopVideo();
    alert("⏰ Timer finished");
  }, min * 60000);

  alert("⏱ Timer set: " + min + " min");
}

// 🔥 무조건 멈추는 방식
function stopVideo(){
  const iframe = document.getElementById("player");

  if(iframe){
    // 영상 완전히 제거
    iframe.src = "";
  }
}
</script>
