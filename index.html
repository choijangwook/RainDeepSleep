---
layout: default
title: "ASMR Rain"
---

{% assign latest = site.posts.first %}

<!-- TOP -->
<div class="topbar">
  <a href="{{ site.baseurl }}/">🏠 Home</a>
</div>

<!-- HERO -->
<div class="hero">
  <iframe
    src="https://www.youtube.com/embed/{{ latest.youtube }}?autoplay=1&rel=0"
    allowfullscreen>
  </iframe>
</div>

<!-- INTRO -->
<div style="padding:10px 15px; max-width:900px;">
  {{ latest.intro }}
</div>

<!-- DESCRIPTION -->
<div style="padding:10px 15px; max-width:900px; opacity:0.9;">
  {{ latest.content }}
</div>

<!-- NETFLIX ROW -->
<div class="section-title">🎬 Latest Rain Sounds</div>

<div class="row">

{% for post in site.posts %}

  <a href="{{ site.baseurl }}{{ post.url }}">
    <div class="card">
      <img src="https://img.youtube.com/vi/{{ post.youtube }}/hqdefault.jpg">
      <div>🌧 {{ post.title }}</div>
    </div>
  </a>

{% endfor %}

</div>
