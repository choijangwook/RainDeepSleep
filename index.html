---
layout: default
title: "Rain ASMR"
---

{% assign posts = site.posts %}
{% assign latest = site.posts.first %}

<!-- TOP -->
<div class="topbar">
  <a href="{{ site.baseurl }}/">🏠 Home</a>

  <div>
    <a href="#" onclick="goPrev()">← Prev</a>
    <a href="#" onclick="goNext()">Next →</a>
  </div>
</div>

<!-- VIDEO -->
<div class="video-wrap">
  <iframe
    src="https://www.youtube.com/embed/{{ latest.youtube }}?autoplay=1&rel=0"
    allowfullscreen>
  </iframe>
</div>

<!-- LIST -->
<div style="display:none;">

{% for post in posts %}

  <div data-post="{{ site.baseurl }}{{ post.url }}"
       {% if post.url == latest.url %}data-current="true"{% endif %}>
  </div>

{% endfor %}

</div>
