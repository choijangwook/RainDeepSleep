---
layout: default
title: "Rain ASMR"
---

{% assign latest = site.posts.first %}

<!-- TOP -->
<div class="topbar">
  <a href="{{ site.baseurl }}/">🏠 Home</a>
</div>

<!-- 📌 INTRO (MD short text) -->
<div style="max-width:900px;margin:10px auto;text-align:center;">
  {{ latest.intro }}
</div>

<!-- 🎬 VIDEO -->
<div class="video-wrap">
  <iframe
    src="https://www.youtube.com/embed/{{ latest.youtube }}?autoplay=1&rel=0"
    allowfullscreen>
  </iframe>
</div>

<!-- 📌 LONG CONTENT (MD full body) -->
<div style="max-width:900px;margin:20px auto;padding:10px;">

  {{ latest.content }}

</div>

<!-- LIST -->
<h3 style="text-align:center;">Latest Videos</h3>

{% for post in site.posts %}
  <div style="text-align:center;">
    🌧 <a href="{{ site.baseurl }}{{ post.url }}">
      {{ post.title }}
    </a>
  </div>
{% endfor %}
