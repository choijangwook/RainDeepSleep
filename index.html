---
layout: default
title: "Rain Sound for Deep Sleep"
---

<!-- 🔥 배너 -->
<div class="banner">
  <img src="https://via.placeholder.com/1200x300?text=Rain+Deep+Sleep" alt="banner">
</div>

<!-- 🔥 자유 텍스트 영역 (여기에 마음대로 쓰면 됨) -->
<div style="text-align:center;padding:10px;font-size:14px;color:#444;">
  ✨ 여기에 원하는 문구, 소개글, 설명 등을 자유롭게 작성하세요
</div>

<!-- 🎧 최신 사운드 -->
<h2 style="font-size:16px;margin-top:10px;text-align:center;">🎧 Latest Sounds</h2>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;max-width:900px;margin:auto;">

{% for post in site.posts %}
  <a href="{{ site.baseurl }}{{ post.url }}" style="text-decoration:none;color:#000;font-size:13px;">
    
    <div style="background:#eee;border-radius:10px;overflow:hidden;">
      
      {% if post.youtube %}
        <img src="https://img.youtube.com/vi/{{ post.youtube }}/hqdefault.jpg" style="width:100%;">
      {% endif %}
      
      <div style="padding:8px;">
        🌧 {{ post.title }}
      </div>

    </div>

  </a>
{% endfor %}

</div>

<!-- ⏱ TIMER (2h / 4h / 8h) -->
<div style="text-align:center;margin:30px 0;">
  <h3 style="font-size:16px;">⏱ Sleep Timer</h3>

  <button onclick="setTimer(120)" style="padding:10px 15px;margin:5px;border:none;border-radius:8px;background:#4a90e2;color:#fff;">2 hours</button>
  <button onclick="setTimer(240)" style="padding:10px 15px;margin:5px;border:none;border-radius:8px;background:#4a90e2;color:#fff;">4 hours</button>
  <button onclick="setTimer(480)" style="padding:10px 15px;margin:5px;border:none;border-radius:8px;background:#4a90e2;color:#fff;">8 hours</button>
</div>

<script>
function setTimer(min){
  alert("⏰ Timer set for " + min + " minutes");
}
</script>
