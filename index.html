---
layout: default
title: "Rain Sound"
---

<h2 style="text-align:center;">🌧 Rain Sound</h2>

{% assign latest = site.posts.first %}

<!-- VIDEO -->
<div style="position:relative;padding-bottom:56.25%;height:0;">
  <iframe id="player"
    src="https://www.youtube.com/embed/{{ latest.youtube }}"
    style="position:absolute;width:100%;height:100%;"
    allowfullscreen>
  </iframe>
</div>

<!-- TIMER -->
<div style="text-align:center;margin:15px;">

  <b>⏱ TIMER</b>

  <div>
    <button data-timer="120">2 HOURS</button>
    <button data-timer="240">4 HOURS</button>
    <button data-timer="480">8 HOURS</button>
  </div>

  <button data-timer="0.1">TEST (6 sec)</button>

</div>

<!-- LIST -->
<h3 style="text-align:center;">🎬 Latest Videos</h3>

{% for post in site.posts %}
  <div style="padding:5px;">
    🌧 {{ post.title }}
  </div>
{% endfor %}
