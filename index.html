---
layout: default
title: "Rain Sound"
---

<h2 style="text-align:center;">🌧 Rain Sound</h2>

{% assign latest = site.posts.first %}

<!-- 🎬 영상 -->
<div style="position:relative;padding-bottom:56.25%;height:0;">
  <iframe id="player"
    src="https://www.youtube.com/embed/{{ latest.youtube }}"
    style="position:absolute;width:100%;height:100%;"
    allowfullscreen>
  </iframe>
</div>

<!-- ⏱ TIMER -->
<div style="text-align:center;margin:15px;">

  <b>⏱ TIMER</b>

  <div>
    <button onclick="setTimer(120,this)">2h</button>
    <button onclick="setTimer(240,this)">4h</button>
    <button onclick="setTimer(480,this)">8h</button>
  </div>

  <button onclick="setTimer(0.1,this)">TEST</button>

</div>

<!-- 🎬 Latest Videos (URL 안전 버전) -->
<h3 style="text-align:center;">🎬 Latest Videos</h3>

<div>

{% for post in site.posts %}
  <a href="{{ site.baseurl }}{{ post.url }}">
    🌧 {{ post.title }}
  </a><br>
{% endfor %}

</div>
