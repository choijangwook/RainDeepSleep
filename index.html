layout: default
title: "Rain Sound for Deep Sleep"

<style>
body{margin:0;font-family:sans-serif;}

.video{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
}
.video iframe{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

.timer{
  text-align:center;
  padding:15px;
}

.timer-row{
  display:flex;
  gap:10px;
}

.timer-row button{
  flex:1;
  padding:12px;
  border:none;
  background:#4a90e2;
  color:#fff;
  border-radius:8px;
}

.timer-row button.active{
  background:#222;
}

.test-btn{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  background:#333;
  color:#fff;
  border-radius:8px;
}

.test-btn.active{
  background:#111;
}
</style>

<h2 style="text-align:center;">🌧 Rain Sound for Deep Sleep</h2>

<div class="video">
<iframe id="player"
src="https://www.youtube.com/embed/{{ site.posts.first.youtube }}"
allowfullscreen>
</iframe>
</div>

<div class="timer">
  <b>⏱ TIMER</b>

  <div class="timer-row">
    <button onclick="setTimer(120,this)">2h</button>
    <button onclick="setTimer(240,this)">4h</button>
    <button onclick="setTimer(480,this)">8h</button>
  </div>

  <button class="test-btn" onclick="setTimer(0.1,this)">TEST</button>
</div>




<button onclick="alert('JS OK')">JS TEST</button>
