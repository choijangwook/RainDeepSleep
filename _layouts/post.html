<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <style>
    .yt-wrapper {
      margin-top: 20px;
    }

    .yt-button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 18px 0;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      background-color: #ff0000;
      border-radius: 14px;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s ease;
    }

    .yt-button:hover {
      background-color: #cc0000;
      transform: scale(1.02);
    }
  </style>
</head>

<body>

  <h1>{{ page.title }}</h1>
  <p>{{ page.date | date: "%Y-%m-%d" }}</p>

  {% if page.youtube_id %}
    
    <div class="yt-wrapper">
      <a class="yt-button"
         href="https://www.youtube.com/watch?v={{ page.youtube_id }}"
         target="_blank">
         ▶ Play on YouTube
      </a>
    </div>

  {% endif %}

  <hr>

  <div>
    {{ content }}
  </div>

</body>
</html>
