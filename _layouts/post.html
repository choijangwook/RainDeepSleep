<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <style>
    .yt-wrapper {
      margin-top: 20px;
    }

    .yt-button {
      display: block;
      width: 100%;
      padding: 18px 0;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      background-color: #ff0000;
      border-radius: 14px;
      text-align: center;
      text-decoration: none;
    }

    .ad-box {
      margin: 20px auto;
      text-align: center;
    }

    .ad-fixed {
      width: 320px;
      height: 100px;
      margin: 0 auto;
    }
  </style>
</head>

<body>

<h1>{{ page.title }}</h1>
<p>{{ page.date | date: "%Y-%m-%d" }}</p>

<!-- 상단 광고 -->
<div class="ad-box">
  <div class="ad-fixed">
    <ins class="adsbygoogle"
         style="display:inline-block;width:320px;height:100px"
         data-ad-client="ca-pub-XXXXXXXXXXXX"
         data-ad-slot="1111111111"></ins>
  </div>

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>

{% if page.youtube_id %}
<div class="yt-wrapper">
  <a class="yt-button"
     href="https://www.youtube.com/watch?v={{ page.youtube_id }}"
     target="_blank">
     ▶ Play on YouTube
  </a>
</div>
{% endif %}

<hr>

<div>
  {{ content }}
</div>

<!-- 중간 광고 -->
<div class="ad-box">
  <div class="ad-fixed">
    <ins class="adsbygoogle"
         style="display:inline-block;width:320px;height:100px"
         data-ad-client="ca-pub-XXXXXXXXXXXX"
         data-ad-slot="2222222222"></ins>
  </div>

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>

<!-- 하단 광고 -->
<div class="ad-box">
  <div class="ad-fixed">
    <ins class="adsbygoogle"
         style="display:inline-block;width:320px;height:100px"
         data-ad-client="ca-pub-XXXXXXXXXXXX"
         data-ad-slot="3333333333"></ins>
  </div>

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>

</body>
</html>
