<script>
let timer = null;

window.setTimer = function(min, btn){

  if(timer){
    clearTimeout(timer);
    timer = null;
  }

  document.querySelectorAll("button").forEach(b=>{
    b.classList.remove("active");
  });

  if(btn){
    btn.classList.add("active");
  }

  console.log("TIMER:", min);

  timer = setTimeout(()=>{
    stopVideo();
    alert("⏰ TEST / TIMER FINISHED");
  }, Number(min) * 60000);
};

// 🔥 진짜 확실한 정지 방식
function stopVideo(){

  const old = document.getElementById("player");

  if(old){

    // 1. iframe 제거
    old.remove();

    // 2. 다시 생성 (완전 초기화)
    const wrapper = document.createElement("div");
    wrapper.style.position = "relative";
    wrapper.style.paddingBottom = "56.25%";
    wrapper.style.height = "0";

    wrapper.innerHTML = `
      <iframe
        id="player"
        src=""
        style="position:absolute;width:100%;height:100%;"
        allowfullscreen>
      </iframe>
    `;

    document.body.insertBefore(wrapper, document.body.children[1]);
  }
}
</script>
