<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.topbar a{
  padding:6px 10px;
  background:#333;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
}

button.active{
  background:#222;
  color:#fff;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
}
</style>
</head>

<body>

{{ content }}

<script>
let timer = null;

function setTimer(min, btn){

  if(timer){
    clearTimeout(timer);
  }

  document.querySelectorAll("button").forEach(b=>{
    b.classList.remove("active");
  });

  if(btn){
    btn.classList.add("active");
  }

  timer = setTimeout(()=>{
    alert("⏰ FINISHED");
  }, Number(min) * 60000);
}
</script>

</body>
</html>
