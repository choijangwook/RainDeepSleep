<script>
let timer;
let selectedBtn = null;

// 타이머 설정
function setTimer(min, btn){
  if(timer) clearTimeout(timer);

  // 🔥 버튼 색 초기화
  document.querySelectorAll('.timer-row button').forEach(b=>{
    b.classList.remove('active');
  });

  // 🔥 선택된 버튼 강조
  if(btn){
    btn.classList.add('active');
    selectedBtn = btn;
  }

  alert("타이머 설정: " + min + "분");

  timer = setTimeout(()=>{
    const player = document.getElementById("player");
    if(player){
      player.remove();
    }

    alert("⏰ 타이머 종료");

    // 종료 후 버튼 상태 초기화
    if(selectedBtn){
      selectedBtn.classList.remove('active');
      selectedBtn = null;
    }

  }, min * 60000);
}
</script>
