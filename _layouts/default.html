<script>
let timer;

function setTimer(min, btn){

  // 🔥 기존 타이머 무조건 제거
  if(timer){
    clearTimeout(timer);
    timer = null;
  }

  // 버튼 색 초기화
  document.querySelectorAll('.timer-row button, .test-btn').forEach(b=>{
    b.classList.remove('active');
  });

  if(btn){
    btn.classList.add('active');
  }

  alert("타이머 설정: " + min + "분");

  timer = setTimeout(()=>{
    stopVideo();
    alert("⏰ 종료");
  }, min * 60000);
}

// 🔥 완전 확실 정지
function stopVideo(){
  const iframe = document.getElementById("player");

  if(iframe){
    iframe.src = iframe.src; // 핵심: reload = 무조건 stop
  }
}
</script>
