<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:#fff;
}

/* top */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.6);
  z-index:10;
}

.topbar a{
  color:#fff;
  text-decoration:none;
  padding:6px 10px;
  background:#333;
  border-radius:6px;
}

/* video full focus */
.video-wrap{
  width:100%;
  height:100vh;
  padding-top:50px;
}

.video-wrap iframe{
  width:100%;
  height:100%;
  border:0;
}
</style>
</head>

<body>

{{ content }}

</body>
</html>
