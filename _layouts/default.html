<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <style>
    body{
      margin:0;
      font-family:sans-serif;
    }

    .active{
      background:#222 !important;
      color:#fff !important;
    }
  </style>
</head>

<body>

  {{ content }}

  <!-- 🔥 TIMER SCRIPT -->
  <script>
    let timer = null;
    let activeBtn = null;

    function setTimer(min, btn){

      // 기존 타이머 제거
      if(timer){
        clearTimeout(timer);
        timer = null;
      }

      // 버튼 초기화
      document.querySelectorAll('.timer-row button, .test-btn')
        .forEach(b => b.classList.remove('active'));

      if(btn){
        btn.classList.add('active');
        activeBtn = btn;
      }

      alert("⏱ 타이머 설정: " + min + "분");

      timer = setTimeout(()=>{
        stopVideo();

        alert("⏰ 종료");

        if(activeBtn){
          activeBtn.classList.remove('active');
          activeBtn = null;
        }

      }, min * 60000);
    }

    function stopVideo(){
      const iframe = document.getElementById("player");

      if(iframe){
        const src = iframe.src;
        iframe.src = "";
        iframe.src = src; // 🔥 가장 안정적인 정지 방식
      }
    }
  </script>

</body>
</html>
