---
layout: default
---

<article>

  <h1>{{ page.title }}</h1>

  <!-- 🎥 유튜브 영상 -->
  <iframe width="100%" height="500"
    src="https://www.youtube.com/embed/{{ page.youtube_id }}"
    frameborder="0"
    allowfullscreen>
  </iframe>

  <!-- 🔥 같은 카테고리 추천 -->
  <h2>More Like This</h2>

  <div class="grid">
  {% assign current_category = page.categories[0] %}
  {% for post in site.categories[current_category] %}
    {% if post.url != page.url %}
      <a href="{{ site.baseurl }}{{ post.url }}" class="card">

        <img src="https://img.youtube.com/vi/{{ post.youtube_id }}/hqdefault.jpg">

        <div class="card-content">
          <div class="card-title">{{ post.title }}</div>
        </div>

      </a>
    {% endif %}
  {% endfor %}
  </div>

</article>
