<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:#fff;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  position:fixed;
  top:0;
  width:100%;
  z-index:10;
  background:rgba(0,0,0,0.6);
}

.topbar a{
  color:#fff;
  text-decoration:none;
  padding:6px 10px;
  background:#333;
  border-radius:6px;
}

/* VIDEO */
.video-wrap{
  width:100%;
  height:100vh;
  padding-top:50px;
}

.video-wrap iframe{
  width:100%;
  height:100%;
  border:0;
}
</style>
</head>

<body>

{{ content }}

<script>
let posts = [];
let currentIndex = 0;

/* init */
document.addEventListener("DOMContentLoaded", ()=>{
  const items = document.querySelectorAll("[data-post]");
  items.forEach((el,i)=>{
    posts.push(el.dataset.post);
    if(el.dataset.current === "true"){
      currentIndex = i;
    }
  });
});

/* NEXT / PREV */
function goNext(){
  if(currentIndex < posts.length - 1){
    currentIndex++;
    location.href = posts[currentIndex];
  }
}

function goPrev(){
  if(currentIndex > 0){
    currentIndex--;
    location.href = posts[currentIndex];
  }
}

/* AUTO NEXT (핵심) */
function autoNext(){
  setTimeout(()=>{
    goNext();
  }, 10000); // 10초 테스트 (나중에 영상 길이로 확장 가능)
}
</script>

</body>
</html>
