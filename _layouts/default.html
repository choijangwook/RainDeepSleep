<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:#fff;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  margin:4px;
  cursor:pointer;
}

.active{
  background:#444;
  color:#fff;
}

/* 🌙 sleep mode */
.sleep{
  background:#000 !important;
  filter:brightness(0.3);
}
</style>
</head>

<body>

{{ content }}

<script>
let timer = null;

function setTimer(min, btn){

  if(timer){
    clearTimeout(timer);
  }

  document.querySelectorAll("button").forEach(b=>{
    b.classList.remove("active");
  });

  if(btn){
    btn.classList.add("active");
  }

  showStatus(min);

  timer = setTimeout(()=>{
    sleepMode();
  }, min * 60000);
}

function showStatus(min){
  let old = document.getElementById("status");
  if(old) old.remove();

  let div = document.createElement("div");
  div.id = "status";
  div.style.textAlign = "center";
  div.style.margin = "10px";
  div.innerText = "⏱ Timer running: " + min + " min";
  document.body.appendChild(div);
}

function sleepMode(){
  document.body.classList.add("sleep");

  let div = document.createElement("div");
  div.style.textAlign = "center";
  div.style.padding = "20px";
  div.innerHTML = "🌙 Sleep session finished";

  document.body.appendChild(div);
}
</script>

</body>
</html>
