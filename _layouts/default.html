<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  padding:0;
  font-family:sans-serif;
  background:#fafafa;
  overflow-x:hidden;
  text-align:center;
}

/* 제목 */
h1{
  font-size:20px;
  margin:15px 10px;
}

/* 영상 풀폭 */
.video{
  position:relative;
  width:100vw;
  left:50%;
  margin-left:-50vw;
  padding-bottom:56.25%;
  height:0;
}
.video iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* 본문 */
.content{
  padding:10px;
  max-width:900px;
  margin:auto;
}

/* 키워드 */
.keywords{
  color:#555;
  font-size:14px;
  margin-top:10px;
}

/* 페이지 네비 */
.pagination{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
  margin:50px 0;
  font-size:22px;
}

.pagination a{
  text-decoration:none;
  color:#333;
  padding:10px 14px;
}

.pagination span{
  padding:10px 14px;
}

.active{
  background:#4a90e2;
  color:#fff;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- 제목 -->
<h1>🌧 {{ page.title }}</h1>

<!-- 본문 -->
<div class="content">
  {{ content }}
</div>

<!-- 🔥 자동 이전 / 다음 -->
<div class="pagination">

  {% if page.previous %}
    <a href="{{ page.previous.url }}">←</a>
  {% else %}
    <span style="opacity:0.3;">←</span>
  {% endif %}

  <span class="active">●</span>

  {% if page.next %}
    <a href="{{ page.next.url }}">→</a>
  {% else %}
    <span style="opacity:0.3;">→</span>
  {% endif %}

</div>

</body>
</html>
