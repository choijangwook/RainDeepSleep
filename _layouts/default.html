<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:12px;
  position:fixed;
  width:100%;
  top:0;
  z-index:10;
  background:rgba(0,0,0,0.6);
}

.topbar a{
  color:#fff;
  text-decoration:none;
  padding:6px 10px;
  background:#222;
  border-radius:6px;
}

/* HERO VIDEO */
.hero{
  position:relative;
  width:100%;
  height:80vh;
  margin-top:50px;
}

.hero iframe{
  width:100%;
  height:100%;
  border:0;
}

/* SECTION TITLE */
.section-title{
  padding:10px 15px;
  font-size:18px;
  opacity:0.8;
}

/* ROW (Netflix style) */
.row{
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.card{
  min-width:200px;
  background:#111;
  border-radius:8px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
}

.card div{
  padding:8px;
  font-size:13px;
}
</style>
</head>

<body>

{{ content }}

</body>
</html>
