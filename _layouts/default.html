<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }}</title>

  <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
</head>

<body>

<header class="header">

  <h2 class="logo">🌧 Rain Deep Sleep</h2>

  <!-- 🔍 검색 -->
  <input type="text" id="searchInput" placeholder="Search rain sounds...">

  <!-- 1줄 -->
  <nav class="nav-top">
    <a href="{{ site.baseurl }}/" class="home-btn">🏠 Home</a>
    <a href="{{ site.baseurl }}/about.html">About</a>
    <a href="{{ site.baseurl }}/privacy.html">Privacy</a>
    <a href="{{ site.baseurl }}/contact.html">Contact</a>
  </nav>

  <!-- 2줄 -->
  <nav class="nav-category">
    <a href="{{ site.baseurl }}/category/tent.html">⛺ Tent</a>
    <a href="{{ site.baseurl }}/category/forest.html">🌲 Forest</a>
    <a href="{{ site.baseurl }}/category/cabin.html">🏡 Cabin</a>
    <a href="{{ site.baseurl }}/category/beach.html">🌊 Beach</a>
    <a href="{{ site.baseurl }}/category/car.html">🚗 Car</a>
    <a href="{{ site.baseurl }}/category/other.html">➕ More</a>
  </nav>

</header>

<main>
  {{ content }}
</main>

<!-- 🔍 검색 스크립트 -->
<script>
document.getElementById("searchInput").addEventListener("keyup", function() {
  let filter = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let text = card.innerText.toLowerCase();
    if (text.includes(filter)) {
      card.style.display = "";
    } else {
      card.style.display = "none";
    }
  });
});
</script>

</body>
</html>
