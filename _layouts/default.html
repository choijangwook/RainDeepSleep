<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow-x:hidden; /* 🔥 밀림 방지 */
  font-family:sans-serif;
  background:#fafafa;
}

/* 컨테이너 */
.container{
  width:100%;
  max-width:100%;
  margin:0 auto;
}

/* 영상 */
.video{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
}
.video iframe{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  border:0;
}

/* 홈 버튼 */
.home{
  position:fixed;
  top:10px;
  left:10px;
  background:#000;
  color:#fff;
  padding:8px 10px;
  border-radius:6px;
  text-decoration:none;
  z-index:999;
}

/* 화살표 */
.nav{
  position:fixed;
  bottom:20px;
  width:50px;
  height:50px;
  background:#000;
  color:#fff;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-decoration:none;
}
.left{ left:15px; }
.right{ right:15px; }

</style>
</head>

<body>

<a href="{{ site.baseurl }}/" class="home">🏠</a>

<div class="container">
{{ content }}
</div>

{% if page.url != "/" %}
  {% if page.next %}
    <a class="nav left" href="{{ site.baseurl }}{{ page.next.url }}">←</a>
  {% endif %}
  {% if page.previous %}
    <a class="nav right" href="{{ site.baseurl }}{{ page.previous.url }}">→</a>
  {% endif %}
{% endif %}

</body>
</html>
