{% if page.url != "/" %}

<div class="nav-btn nav-left">
  {% if page.next %}
    <a href="{{ site.baseurl }}{{ page.next.url }}">←</a>
  {% else %}
    ←
  {% endif %}
</div>

<div class="nav-btn nav-right">
  {% if page.previous %}
    <a href="{{ site.baseurl }}{{ page.previous.url }}">→</a>
  {% else %}
    →
  {% endif %}
</div>

{% endif %}
