<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
}

.topbar{
  display:flex;
  gap:10px;
  padding:10px;
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.8);
  z-index:1000;
}

.topbar a{
  color:#fff;
  text-decoration:none;
  padding:6px 10px;
  background:#222;
  border-radius:6px;
}

.content{
  padding-top:70px;
  max-width:900px;
  margin:auto;
}
</style>
</head>

<body>

<div class="topbar">
  <a href="{{ '/' | relative_url }}">Home</a>
  <a href="{{ '/about/' | relative_url }}">About</a>
  <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
  <a href="{{ '/contact/' | relative_url }}">Contact</a>
</div>

<!-- 🔥 핵심: 반드시 있어야 함 -->
<div class="content">
  {{ content }}
</div>

</body>
</html>
