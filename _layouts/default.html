<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">

  <!-- ✅ Google AdSense -->
  <script async 
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXX"
    crossorigin="anonymous"></script>

  <title>{{ page.title }}</title>

  <style>
    .nav-top, .nav-category {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .btn {
      padding: 6px 10px;
      font-size: 14px;
      white-space: nowrap;
    }

    .adsbygoogle {
      margin: 20px 0;
    }
  </style>
</head>

<body>

<a href="{{ site.baseurl }}/" class="floating-home" onclick="goHome(event)">🏠</a>

<script>
function goHome(e) {
  e.preventDefault();
  window.location.replace("{{ site.baseurl }}/");
}
</script>

<header class="header">

  <!-- ✅ 상단 메뉴 -->
  <nav class="nav-top">
    <a class="btn" href="{{ site.baseurl }}/">Home</a>
    <a class="btn" href="{{ site.baseurl }}/blog.html">Blog</a>
    <a class="btn" href="{{ site.baseurl }}/about.html">About</a>
    <a class="btn" href="{{ site.baseurl }}/contact.html">Contact</a>
    <a class="btn" href="{{ site.baseurl }}/privacy.html">Privacy</a>
    <a class="btn" href="{{ site.baseurl }}/faq.html">FAQ</a>
  </nav>

  <!-- ✅ 카테고리 -->
  <nav class="nav-category">
    <a class="btn" href="{{ site.baseurl }}/category/nature.html">Nature</a>
    <a class="btn" href="{{ site.baseurl }}/category/cabin.html">Cabin</a>
    <a class="btn" href="{{ site.baseurl }}/category/forest.html">Forest</a>
    <a class="btn" href="{{ site.baseurl }}/category/beach.html">Beach</a>
    <a class="btn" href="{{ site.baseurl }}/category/other.html">Others</a>
  </nav>

</header>

<!-- ✅ 상단 광고 -->
<div class="ad-box">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXXXXXXXXXX"
       data-ad-slot="1111111111"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<main class="container">
  {{ content }}
</main>

<!-- ✅ 하단 광고 -->
<div class="ad-box">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXXXXXXXXXX"

       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

</body>
</html>
