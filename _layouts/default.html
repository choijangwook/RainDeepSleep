<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:#fff;
}

/* 상단 */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}

.topbar a{
  padding:6px 10px;
  background:#333;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
}

/* FULL SCREEN VIDEO */
.video-wrap{
  position:relative;
  width:100%;
  height:60vh; /* 🔥 화면 꽉 차게 */
}

.video-wrap iframe{
  position:absolute;
  width:100%;
  height:100%;
  border:0;
}

/* LIST */
.list{
  padding:10px;
}

.item{
  padding:8px;
  border-bottom:1px solid #222;
}

.item a{
  color:#fff;
  text-decoration:none;
}
</style>
</head>

<body>

{{ content }}

</body>
</html>
