<script>
let timer = null;

// 🔥 핵심: 전역 고정
window.setTimer = function(min, btn){

  if(timer){
    clearTimeout(timer);
    timer = null;
  }

  document.querySelectorAll('button')
    .forEach(b => b.classList.remove('active'));

  if(btn){
    btn.classList.add('active');
  }

  console.log("Timer started:", min);

  timer = setTimeout(()=>{
    const iframe = document.getElementById("player");

    if(iframe){
      iframe.src = iframe.src;
    }

    alert("⏰ Timer finished");

  }, Number(min) * 60000);
}
</script>
