<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <style>
    body{
      margin:0;
      font-family:sans-serif;
    }

    .active{
      background:#222 !important;
      color:#fff !important;
    }
  </style>
</head>

<body>

  <!-- 🔥 페이지 내용 -->
  {{ content }}

  <!-- 🔥 JS (무조건 body 안) -->
  <script>
    let timer;

    function setTimer(min, btn){

      if(timer){
        clearTimeout(timer);
      }

      document.querySelectorAll('.timer-row button, .test-btn')
        .forEach(b => b.classList.remove('active'));

      if(btn){
        btn.classList.add('active');
      }

      timer = setTimeout(()=>{
        const iframe = document.getElementById("player");

        if(iframe){
          iframe.src = iframe.src; // 🔥 가장 안정적인 정지 방식
        }

        alert("⏰ 종료");
      }, min * 60000);
    }
  </script>

</body>
</html>
