<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#fafafa;
}

/* 영상 */
.video{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
  height:0;
}
.video iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:0;
}

/* 본문 */
.content{
  padding:10px;
  max-width:900px;
  margin:auto;
  text-align:center;
}

/* 홈 버튼 */
.home-btn{
  position:fixed;
  top:15px;
  left:15px;
  background:#000;
  color:#fff;
  padding:8px 12px;
  border-radius:8px;
  text-decoration:none;
  z-index:999;
  font-size:14px;
}

/* 하단 화살표 */
.nav-btn{
  position:fixed;
  bottom:20px;
  width:50px;
  height:50px;
  background:#000;
  color:#fff;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  text-decoration:none;
  opacity:0.85;
}

.nav-left{ left:15px; }
.nav-right{ right:15px; }

.nav-btn:hover{
  opacity:1;
}
</style>
</head>

<body>

<!-- 🔥 홈 버튼 -->
<a href="/" class="home-btn">🏠</a>

<!-- 제목 -->
<h2 style="text-align:center;margin:10px 0;">
  🌧 {{ page.title }}
</h2>

<!-- 본문 -->
<div class="content">
  {{ content }}
</div>

<!-- 🔥 글 페이지에서만 화살표 표시 -->
{% if page.url != "/" %}

  {% if page.next %}
    <a class="nav-btn nav-left" href="{{ site.baseurl }}{{ page.next.url }}">←</a>
  {% endif %}

  {% if page.previous %}
    <a class="nav-btn nav-right" href="{{ site.baseurl }}{{ page.previous.url }}">→</a>
  {% endif %}
  
{% endif %}

</body>
</html>
