---
layout: default
---

<section class="hero">
  <h1>Rain Sounds for Deep Sleep</h1>
</section>

<!-- 🔥 AD MID -->
<div class="ad-box">
  <!-- AdSense Middle -->
</div>

<div class="grid">

{% for post in site.posts %}

  <a class="card" href="{{ site.baseurl }}{{ post.url }}">
    <img src="https://img.youtube.com/vi/{{ post.youtube_id }}/hqdefault.jpg">
    <div class="card-content">
      <div class="card-title">{{ post.title }}</div>
    </div>
  </a>

{% endfor %}

</div>
