---
layout: default
---

<!-- 🔥 md에서 수정 가능 -->
<section class="hero">
  {{ content }}
</section>

<div class="grid">

{% for post in site.posts %}

  <div class="card">

    <!-- 🔥 썸네일 클릭 → 내부 post (오류 해결 핵심) -->
    <a href="{{ site.baseurl }}{{ post.url }}" class="thumb-link">

      <div class="thumb-wrapper">
        <img src="https://img.youtube.com/vi/{{ post.youtube_id }}/hqdefault.jpg">

        <!-- ▶ -->
        <div class="play-button">▶</div>
      </div>

    </a>

    <!-- 🔥 제목 → 유튜브 이동 -->
    <a class="card-title-link"
       href="https://www.youtube.com/watch?v={{ post.youtube_id }}"
       target="_blank">

      <div class="card-title">
        {{ post.title }}
      </div>

    </a>

  </div>

{% endfor %}

</div>
