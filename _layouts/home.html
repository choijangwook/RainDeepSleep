---
layout: default
---

<section class="hero">
  {{ content }}
</section>

<div class="grid">

{% for post in site.posts %}

<div class="card">

  <div class="thumb-wrapper">

    <!-- 썸네일 → 내부 페이지 -->
    <a href="{{ site.baseurl }}{{ post.url }}">
      <img src="https://img.youtube.com/vi/{{ post.youtube_id }}/hqdefault.jpg">
    </a>

    <!-- ▶ → 유튜브 -->
    <a href="https://www.youtube.com/watch?v={{ post.youtube_id }}"
       target="_blank"
       class="play-button">▶</a>

  </div>

  <!-- 제목 -->
  <a href="{{ site.baseurl }}{{ post.url }}" class="card-title-link">
    <div class="card-title">
      {{ post.title }}
    </div>
  </a>

</div>

{% endfor %}

</div>
