---
layout: default
---

<section class="hero">
  {{ content }}
</section>

<div class="grid">

{% for post in site.posts %}

<div class="card">

  <!-- 🔥 썸네일 → 내부 페이지 (안정 재생) -->
  <a href="{{ site.baseurl }}{{ post.url }}" class="thumb-link">

    <div class="thumb-wrapper">
      <img src="https://img.youtube.com/vi/{{ post.youtube_id }}/hqdefault.jpg">

      <!-- ▶ 중앙 버튼 -->
      <div class="play-button">▶</div>
    </div>

  </a>

  <!-- 🔥 유튜브 버튼 -->
  <a class="youtube-btn"
     href="https://www.youtube.com/watch?v={{ post.youtube_id }}"
     target="_blank">
     ▶ Play on YouTube
  </a>

</div>

{% endfor %}

</div>
